<div class="space-y-3">
    <div>
        <div class="flex justify-between text-[12px] mb-1.5">
            <span class="text-fg-sub">R2 云存储</span>
            <span class="text-fg-strong font-mono">{{ r2.used_formatted }} / {{ r2.total_formatted }}</span>
        </div>
        <div class="w-full h-1.5 bg-muted rounded-full overflow-hidden">
            <div class="h-full bg-fg-strong rounded-full transition-all" style="width: {{ r2.usage_percent }}%"></div>
        </div>
        <div class="text-[11px] text-fg-faint mt-1">{{ r2.file_count }} 个文件</div>
    </div>
    <div>
        <div class="flex justify-between text-[12px] mb-1.5">
            <span class="text-fg-sub">本地磁盘</span>
            <span class="text-fg-strong font-mono">{{ local.used_formatted }} / {{ local.total_formatted }}</span>
        </div>
        <div class="w-full h-1.5 bg-muted rounded-full overflow-hidden">
            <div class="h-full bg-fg-faint rounded-full transition-all" style="width: {{ local.usage_percent }}%"></div>
        </div>
        <div class="text-[11px] text-fg-faint mt-1">{{ local.file_count }} 个文件</div>
    </div>
</div>
