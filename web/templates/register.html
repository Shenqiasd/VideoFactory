<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 视频工厂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                },
                colors: {
                    border: '#f0f1f1',
                    muted: '#f5f5f5',
                    fg: {
                        DEFAULT: '#787878',
                        strong: '#3f3f3f',
                        sub: '#8d8d8d',
                        faint: '#b3b4b4',
                    },
                },
            }
        }
    }
    </script>
</head>
<body class="bg-white text-fg antialiased min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-6">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2.5 mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3f3f3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span class="text-[18px] font-semibold text-fg-strong">视频工厂</span>
            </div>
            <p class="text-[13px] text-fg-sub">创建账号以开始使用</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label for="username-input" class="block text-[12px] text-fg-sub mb-1.5">用户名</label>
                <input id="username-input" type="text" placeholder="至少 2 个字符"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="username" minlength="2" required />
            </div>
            <div>
                <label for="password-input" class="block text-[12px] text-fg-sub mb-1.5">密码</label>
                <input id="password-input" type="password" placeholder="至少 6 个字符"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="new-password" minlength="6" required />
            </div>
            <div>
                <label for="password-confirm" class="block text-[12px] text-fg-sub mb-1.5">确认密码</label>
                <input id="password-confirm" type="password" placeholder="再次输入密码"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="new-password" minlength="6" required />
            </div>
            <div id="error-box" class="hidden rounded-xl bg-red-50 border border-red-200 px-3 py-2 text-[12px] text-red-700"></div>
            <button type="submit"
                    class="w-full h-11 rounded-2xl bg-fg-strong text-white text-[14px] font-semibold hover:bg-black transition">
                注册
            </button>
        </form>

        <p class="text-center text-[13px] text-fg-sub mt-6">
            已有账号？<a href="/login" class="text-fg-strong font-medium hover:underline">登录</a>
        </p>
    </div>

    <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username-input').value.trim();
        const password = document.getElementById('password-input').value;
        const confirm = document.getElementById('password-confirm').value;
        const errorBox = document.getElementById('error-box');
        errorBox.classList.add('hidden');

        if (!username || !password) return;

        if (password !== confirm) {
            errorBox.textContent = '两次输入的密码不一致';
            errorBox.classList.remove('hidden');
            return;
        }

        try {
            const resp = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (resp.ok && data.success) {
                const next = new URLSearchParams(window.location.search).get('next') || '/';
                window.location.href = next;
            } else {
                errorBox.textContent = data.detail || '注册失败';
                errorBox.classList.remove('hidden');
            }
        } catch (err) {
            errorBox.textContent = '网络错误，请重试';
            errorBox.classList.remove('hidden');
        }
    });
    </script>
</body>
</html>
