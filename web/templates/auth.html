<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 视频工厂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                },
                colors: {
                    border: '#f0f1f1',
                    muted: '#f5f5f5',
                    fg: {
                        DEFAULT: '#787878',
                        strong: '#3f3f3f',
                        sub: '#8d8d8d',
                        faint: '#b3b4b4',
                    },
                },
            }
        }
    }
    </script>
</head>
<body class="bg-white text-fg antialiased min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm mx-auto px-6">
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2.5 mb-4">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#3f3f3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span class="text-[18px] font-semibold text-fg-strong">视频工厂</span>
            </div>
        </div>

        <!-- Tab switcher -->
        <div id="tab-bar" class="flex rounded-2xl bg-muted p-1 mb-6">
            <button id="tab-login" onclick="switchTab('login')"
                    class="flex-1 h-9 rounded-xl text-[13px] font-medium transition-all">
                登录
            </button>
            <button id="tab-register" onclick="switchTab('register')"
                    class="flex-1 h-9 rounded-xl text-[13px] font-medium transition-all">
                注册
            </button>
        </div>

        <!-- Login form -->
        <form id="login-form" class="space-y-4">
            <div>
                <label for="login-username" class="block text-[12px] text-fg-sub mb-1.5">用户名</label>
                <input id="login-username" type="text" placeholder="输入用户名"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="username" required />
            </div>
            <div>
                <label for="login-password" class="block text-[12px] text-fg-sub mb-1.5">密码</label>
                <input id="login-password" type="password" placeholder="输入密码"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="current-password" required />
            </div>
            <div id="login-error" class="hidden rounded-xl bg-red-50 border border-red-200 px-3 py-2 text-[12px] text-red-700"></div>
            <button type="submit"
                    class="w-full h-11 rounded-2xl bg-fg-strong text-white text-[14px] font-semibold hover:bg-black transition">
                登录
            </button>
        </form>

        <!-- Register form -->
        <form id="register-form" class="space-y-4 hidden">
            <div>
                <label for="reg-username" class="block text-[12px] text-fg-sub mb-1.5">用户名</label>
                <input id="reg-username" type="text" placeholder="至少 2 个字符"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="username" minlength="2" required />
            </div>
            <div>
                <label for="reg-password" class="block text-[12px] text-fg-sub mb-1.5">密码</label>
                <input id="reg-password" type="password" placeholder="至少 6 个字符"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="new-password" minlength="6" required />
            </div>
            <div>
                <label for="reg-password-confirm" class="block text-[12px] text-fg-sub mb-1.5">确认密码</label>
                <input id="reg-password-confirm" type="password" placeholder="再次输入密码"
                       class="w-full h-11 px-4 rounded-2xl border border-border text-[14px] text-fg-strong outline-none focus:border-fg-faint transition"
                       autocomplete="new-password" minlength="6" required />
            </div>
            <div id="register-error" class="hidden rounded-xl bg-red-50 border border-red-200 px-3 py-2 text-[12px] text-red-700"></div>
            <button type="submit"
                    class="w-full h-11 rounded-2xl bg-fg-strong text-white text-[14px] font-semibold hover:bg-black transition">
                注册
            </button>
        </form>
    </div>

    <script>
    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let currentTab = 'login';           // default
    let registrationAllowed = false;

    // -----------------------------------------------------------------------
    // Tab switching
    // -----------------------------------------------------------------------
    function switchTab(tab) {
        currentTab = tab;
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');

        // Hide all error boxes
        document.getElementById('login-error').classList.add('hidden');
        document.getElementById('register-error').classList.add('hidden');

        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            tabLogin.classList.add('bg-white', 'text-fg-strong', 'shadow-sm');
            tabLogin.classList.remove('text-fg-sub');
            tabRegister.classList.remove('bg-white', 'text-fg-strong', 'shadow-sm');
            tabRegister.classList.add('text-fg-sub');
            document.title = '登录 - 视频工厂';
            history.replaceState(null, '', '/login' + window.location.search);
        } else {
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            tabRegister.classList.add('bg-white', 'text-fg-strong', 'shadow-sm');
            tabRegister.classList.remove('text-fg-sub');
            tabLogin.classList.remove('bg-white', 'text-fg-strong', 'shadow-sm');
            tabLogin.classList.add('text-fg-sub');
            document.title = '注册 - 视频工厂';
            history.replaceState(null, '', '/register' + window.location.search);
        }
    }

    // -----------------------------------------------------------------------
    // Determine initial tab + whether registration is allowed
    // -----------------------------------------------------------------------
    (async function init() {
        // Detect initial mode from URL path
        const initialMode = window.location.pathname === '/register' ? 'register' : 'login';

        try {
            const resp = await fetch('/api/auth/status');
            const data = await resp.json();
            registrationAllowed = !!data.registration_allowed;
        } catch (_) {
            registrationAllowed = false;
        }

        // Show/hide tab bar based on registration policy
        const tabBar = document.getElementById('tab-bar');
        if (registrationAllowed) {
            tabBar.classList.remove('hidden');
            switchTab(initialMode);
        } else {
            // Registration not allowed — hide tab bar, force login
            tabBar.classList.add('hidden');
            switchTab('login');
        }
    })();

    // -----------------------------------------------------------------------
    // Login handler
    // -----------------------------------------------------------------------
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;
        const errorBox = document.getElementById('login-error');
        errorBox.classList.add('hidden');

        if (!username || !password) return;

        try {
            const resp = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (resp.ok && data.success) {
                const raw = new URLSearchParams(window.location.search).get('next') || '/';
                const next = (raw.startsWith('/') && !raw.startsWith('//')) ? raw : '/';
                window.location.href = next;
            } else {
                errorBox.textContent = data.detail || '登录失败';
                errorBox.classList.remove('hidden');
            }
        } catch (err) {
            errorBox.textContent = '网络错误，请重试';
            errorBox.classList.remove('hidden');
        }
    });

    // -----------------------------------------------------------------------
    // Register handler
    // -----------------------------------------------------------------------
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-password-confirm').value;
        const errorBox = document.getElementById('register-error');
        errorBox.classList.add('hidden');

        if (!username || !password) return;

        if (password !== confirm) {
            errorBox.textContent = '两次输入的密码不一致';
            errorBox.classList.remove('hidden');
            return;
        }

        try {
            const resp = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            });
            const data = await resp.json();
            if (resp.ok && data.success) {
                const raw = new URLSearchParams(window.location.search).get('next') || '/';
                const next = (raw.startsWith('/') && !raw.startsWith('//')) ? raw : '/';
                window.location.href = next;
            } else {
                errorBox.textContent = data.detail || '注册失败';
                errorBox.classList.remove('hidden');
            }
        } catch (err) {
            errorBox.textContent = '网络错误，请重试';
            errorBox.classList.remove('hidden');
        }
    });
    </script>
</body>
</html>
