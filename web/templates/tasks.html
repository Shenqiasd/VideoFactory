{% extends "base.html" %}
{% block title %}任务列表 - 视频工厂{% endblock %}
{% block nav_tasks %}active{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-[21px] font-bold text-fg-strong">任务列表</h1>
        <p class="text-[14px] text-fg-sub mt-1">管理和监控所有视频处理任务</p>
    </div>
    <a href="/tasks/new" class="inline-flex items-center gap-1.5 h-9 px-5 rounded-full bg-black text-white text-[13px] font-semibold hover:bg-fg-strong shadow-btn transition">
        <i data-lucide="plus" class="w-4 h-4"></i>
        新建任务
    </a>
</div>

<!-- Filters -->
<div class="flex items-center gap-3 mb-5" x-data="{ status: 'all' }">
    <div class="flex gap-1 p-1 bg-muted rounded-2xl">
        {% for val, label in [('all','全部'), ('active','活跃'), ('completed','已完成'), ('failed','失败')] %}
        <button @click="status = '{{ val }}'; htmx.ajax('GET', '/web/partials/task_list?status={{ val }}', {target: '#task-list-container', swap: 'innerHTML'})"
                :class="status === '{{ val }}' ? 'bg-white shadow-md text-fg-strong font-semibold' : 'text-fg-sub hover:text-fg hover:bg-white/40'"
                class="px-3 py-1.5 rounded-xl text-[13px] transition">
            {{ label }}
        </button>
        {% endfor %}
    </div>
</div>

<!-- Task List -->
<div class="rounded-3xl border border-border p-6 shadow-card">
    <div id="task-list-container"
         hx-get="/web/partials/task_list"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="space-y-3">
            <div class="h-[72px] rounded-2xl bg-muted animate-pulse"></div>
            <div class="h-[72px] rounded-2xl bg-muted animate-pulse"></div>
            <div class="h-[72px] rounded-2xl bg-muted animate-pulse"></div>
        </div>
    </div>
</div>
{% endblock %}
