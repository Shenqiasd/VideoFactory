<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}视频工厂{% endblock %}</title>

    <!-- Inter (closest CDN alternative to Geist) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwindcss.config = {
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
                    mono: ['JetBrains Mono', 'monospace'],
                },
                borderRadius: {
                    '2xl': '1rem',
                    '3xl': '1.5rem',
                },
                boxShadow: {
                    'card': '0px 18px 59.6px 0px rgba(0,0,0,0.06)',
                    'card-hover': '0px 18px 59.6px 0px rgba(0,0,0,0.10)',
                    'btn': '0px 0px 12px 0px rgba(0,0,0,0.1)',
                },
                colors: {
                    border: '#f0f1f1',
                    muted: '#f5f5f5',
                    'muted-dark': '#e8e8e8',  // 更深的柔和色，用于选中状态
                    fg: {
                        DEFAULT: '#787878',
                        strong: '#3f3f3f',
                        sub: '#8d8d8d',
                        faint: '#b3b4b4',
                    },
                },
            }
        }
    }
    </script>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>

    <style>
        html { font-size: 14.4px; }

        /* HTMX transitions */
        .htmx-swapping { opacity: 0; transition: opacity 150ms ease; }
        .htmx-settling { opacity: 1; transition: opacity 150ms ease; }

        /* Smooth progress bar */
        .task-progress { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

        /* Sidebar nav item */
        .nav-item { transition: background 0.15s ease, color 0.15s ease; }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #f0f1f1; color: #3f3f3f; font-weight: 500; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>

<body class="bg-white text-fg antialiased">
    <div class="flex h-screen overflow-hidden">

        <!-- ═══ Left Sidebar ═══ -->
        <aside class="w-[240px] flex-shrink-0 border-r border-border flex flex-col h-screen">
            <!-- Logo -->
            <div class="px-5 py-5 flex items-center gap-2.5">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3f3f3f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                <span class="text-[15px] font-semibold text-fg-strong">视频工厂</span>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 space-y-0.5 overflow-y-auto">
                <a href="/" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_dashboard %}{% endblock %}">
                    <i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i>
                    总览
                </a>
                <a href="/tasks/new" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_new_task %}{% endblock %}">
                    <i data-lucide="plus-circle" class="w-[18px] h-[18px]"></i>
                    新建任务
                </a>
                <a href="/tasks" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_tasks %}{% endblock %}">
                    <i data-lucide="list" class="w-[18px] h-[18px]"></i>
                    任务列表
                </a>

                <div class="h-px bg-border my-3"></div>

                <a href="/publish" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_publish %}{% endblock %}">
                    <i data-lucide="send" class="w-[18px] h-[18px]"></i>
                    发布管理
                </a>
                <a href="/accounts" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_accounts %}{% endblock %}">
                    <i data-lucide="users" class="w-[18px] h-[18px]"></i>
                    账号管理
                </a>
                <a href="/storage" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_storage %}{% endblock %}">
                    <i data-lucide="hard-drive" class="w-[18px] h-[18px]"></i>
                    存储管理
                </a>
                <a href="/settings" class="nav-item flex items-center gap-3 px-3 py-2 rounded-xl text-[14px] {% block nav_settings %}{% endblock %}">
                    <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
                    设置
                </a>
            </nav>

            <!-- Service Status (bottom) -->
            <div class="px-3 py-4 border-t border-border"
                 hx-get="/web/partials/service_status_sidebar"
                 hx-trigger="load, every 10s"
                 hx-swap="innerHTML">
                <div class="flex items-center gap-2 px-3 py-2 text-[12px] text-fg-sub">
                    <span class="w-1.5 h-1.5 rounded-full bg-fg-faint"></span>
                    检查服务中...
                </div>
            </div>
        </aside>

        <!-- ═══ Main Content ═══ -->
        <main class="flex-1 overflow-y-auto">
            <div class="mx-auto max-w-[1200px] px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 space-y-2"></div>

    <!-- Global JS -->
    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Re-init icons after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function() {
            lucide.createIcons();
        });

        document.body.addEventListener('htmx:responseError', function(e) {
            showToast('请求失败', 'error');
        });

        function showToast(msg, type) {
            var el = document.createElement('div');
            el.className = 'px-4 py-3 rounded-2xl text-[13px] shadow-card border border-border bg-white text-fg-strong';
            if (type === 'error') el.className += ' border-red-200 bg-red-50 text-red-700';
            if (type === 'success') el.className += ' border-green-200 bg-green-50 text-green-700';
            el.textContent = msg;
            document.getElementById('toast-container').appendChild(el);
            setTimeout(function() {
                el.style.opacity = '0';
                el.style.transition = 'opacity 0.3s';
                setTimeout(function() { el.remove(); }, 300);
            }, 3000);
        }
        window.showToast = showToast;
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
