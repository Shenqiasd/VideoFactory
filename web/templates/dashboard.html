{% extends "base.html" %}
{% block title %}总览 - 视频工厂{% endblock %}
{% block nav_dashboard %}active{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-[21px] font-bold text-fg-strong">总览</h1>
    <p class="text-[14px] text-fg-sub mt-1">系统运行状态一览</p>
</div>

<!-- Stats -->
<div hx-get="/web/partials/stats_cards" hx-trigger="load, every 5s" hx-swap="innerHTML">
    <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="h-[88px] rounded-3xl border border-border animate-pulse"></div>
        <div class="h-[88px] rounded-3xl border border-border animate-pulse"></div>
        <div class="h-[88px] rounded-3xl border border-border animate-pulse"></div>
        <div class="h-[88px] rounded-3xl border border-border animate-pulse"></div>
    </div>
</div>

<div class="grid grid-cols-3 gap-5">
    <!-- Active Tasks -->
    <div class="col-span-2">
        <div class="rounded-3xl border border-border p-6 shadow-card">
            <div class="flex items-center justify-between mb-5">
                <h2 class="text-[15px] font-semibold text-fg-strong">活跃任务</h2>
                <a href="/tasks/new" class="inline-flex items-center gap-1.5 h-8 px-4 rounded-full bg-black text-white text-[12px] font-semibold hover:bg-fg-strong shadow-btn transition">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                    新建
                </a>
            </div>
            <div hx-get="/web/partials/active_tasks" hx-trigger="load, every 3s" hx-swap="innerHTML">
                <div class="space-y-3">
                    <div class="h-16 rounded-2xl bg-muted animate-pulse"></div>
                    <div class="h-16 rounded-2xl bg-muted animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Column -->
    <div class="col-span-1 space-y-5">
        <div class="rounded-3xl border border-border p-6 shadow-card">
            <h2 class="text-[15px] font-semibold text-fg-strong mb-4">服务状态</h2>
            <div hx-get="/web/partials/service_status_detail" hx-trigger="load, every 10s" hx-swap="innerHTML">
                <div class="space-y-3">
                    <div class="h-6 rounded-xl bg-muted animate-pulse"></div>
                    <div class="h-6 rounded-xl bg-muted animate-pulse"></div>
                    <div class="h-6 rounded-xl bg-muted animate-pulse"></div>
                </div>
            </div>
        </div>

        <div class="rounded-3xl border border-border p-6 shadow-card">
            <h2 class="text-[15px] font-semibold text-fg-strong mb-4">存储</h2>
            <div hx-get="/web/partials/storage_overview" hx-trigger="load, every 30s" hx-swap="innerHTML">
                <div class="space-y-3">
                    <div class="h-10 rounded-xl bg-muted animate-pulse"></div>
                    <div class="h-10 rounded-xl bg-muted animate-pulse"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Recent Completed -->
<div class="rounded-3xl border border-border p-6 shadow-card mt-5">
    <div class="flex items-center justify-between mb-5">
        <h2 class="text-[15px] font-semibold text-fg-strong">最近完成</h2>
        <a href="/tasks?status=completed" class="text-[13px] text-fg-sub hover:text-fg-strong transition">查看全部</a>
    </div>
    <div hx-get="/web/partials/recent_completed" hx-trigger="load, every 10s" hx-swap="innerHTML">
        <div class="h-20 rounded-2xl bg-muted animate-pulse"></div>
    </div>
</div>
{% endblock %}
