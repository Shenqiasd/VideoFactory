# VideoFactory 配置模板
# 复制此文件为 settings.yaml 并填入实际配置

# LLM配置
llm:
  base_url: "https://api.groq.com/openai/v1"
  api_key: "YOUR_API_KEY_HERE"
  model: "llama-3.3-70b-versatile"

# 翻译配置
translation:
  provider: "volcengine_ark"
  strict_json: false
  local_llm:
    enabled: false
    base_url: "http://127.0.0.1:1234/v1"
    api_key: ""
    model: ""
    timeout: 120
  volcengine_ark:
    enabled: false
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: ""
    model: "doubao-seed-translation-250915"
    timeout: 60
  llm:
    timeout: 60

# ASR配置
asr:
  provider: auto
  allow_fallback: true
  allow_router_with_tts: true
  fallback_order:
    - youtube
    - volcengine
    - whisper
  youtube_skip_download: false
  youtube_preferred_langs:
    - en
    - en-US
    - en-GB
  youtube:
    enabled: true
  whisper:
    enabled: true
    base_url: "http://127.0.0.1:8866/v1"
    model: "whisper-1"
    timeout: 600
  volcengine:
    enabled: false
    app_id: "YOUR_APP_ID"
    token: "YOUR_TOKEN"
    http_url: ""
    ws_url: "wss://openspeech.bytedance.com/api/v3/sauc/bigmodel"
    timeout: 120

# TTS配置
tts:
  provider: "volcengine"
  fallback_order:
    - volcengine
  volcengine:
    enabled: true
    appid: "YOUR_APP_ID"
    access_token: "YOUR_TOKEN"
    resource_id: "seed-tts-1.0"
    cluster: "volcano_tts"
    api_url: "https://openspeech.bytedance.com/api/v3/tts/unidirectional"
    default_voice: "zh_female_shuangkuaisisi_moon_bigtts"
    encoding: "mp3"
    sample_rate: 24000
    timeout: 120

# FFmpeg配置
ffmpeg:
  path: ""
  ffprobe_path: ""

# 质量控制配置
quality:
  translation_min_zh_line_ratio: 0.85
  translation_max_unchanged_ratio: 0.15
  translation_max_english_residue_ratio: 0.01
  sentence_regroup_max_cues: 4
  sentence_regroup_target_words: 30
  sentence_regroup_max_words: 32
  sentence_regroup_max_chars: 160
  sentence_regroup_max_pause_seconds: 1.2
  global_review:
    enabled: true
    provider: "llm"
    fail_open: true
    domain_confidence_threshold: 0.6
    chunk_size: 18
    max_excerpt_chars: 12000
    music:
      enabled: true
      max_glossary_terms: 24

# 存储配置
storage:
  r2:
    bucket: "videoflow"
    rclone_remote: "r2"
  local:
    working_dir: "~/.video-factory/working"
    output_dir: "~/.video-factory/output"

# 数据库配置
database:
  # PostgreSQL (生产环境):
  # url: "postgresql+asyncpg://vf:password@localhost:5432/video_factory"
  # SQLite (开发环境, 默认):
  url: ""

# 发布配置
distribute:
  auto_publish: false
  social_auto_upload_path: ""
  account_dir: ""

# 频道监控配置
monitor:
  enabled: false
  default_check_interval: 3600
  max_auto_tasks_per_day: 50

# 多平台 OAuth 配置
# 每个平台需要在对应开放平台注册应用后填入 client_id / client_secret
# 只有配置了密钥的平台才会在启动时注册并可用
oauth:
  # OAuth 回调基础 URL（部署后需改为实际域名）
  callback_base_url: "http://localhost:9000"

  # --- 国际平台 ---
  youtube:
    client_id: ""
    client_secret: ""
    # Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client ID
    # 重定向 URI: {callback_base_url}/api/oauth/callback/youtube
  tiktok:
    client_id: ""
    client_secret: ""
    # TikTok Developer Portal → Manage apps
    # 重定向 URI: {callback_base_url}/api/oauth/callback/tiktok
  facebook:
    app_id: ""
    app_secret: ""
    # Meta for Developers → My Apps → 应用设置 → 基本
    # 重定向 URI: {callback_base_url}/api/oauth/callback/facebook
  instagram:
    # 使用 Facebook App 的凭据（需要 Instagram Business 账号关联到 Facebook Page）
    app_id: ""
    app_secret: ""
    # 重定向 URI: {callback_base_url}/api/oauth/callback/instagram
  threads:
    # 使用 Meta/Threads API 凭据
    app_id: ""
    app_secret: ""
    # 重定向 URI: {callback_base_url}/api/oauth/callback/threads
  twitter:
    client_id: ""
    client_secret: ""
    # Twitter Developer Portal → Projects & Apps → OAuth 2.0
    # 重定向 URI: {callback_base_url}/api/oauth/callback/twitter
  pinterest:
    client_id: ""
    client_secret: ""
    # Pinterest Developer → My Apps
    # 重定向 URI: {callback_base_url}/api/oauth/callback/pinterest
  linkedin:
    client_id: ""
    client_secret: ""
    # LinkedIn Developer → My Apps → Auth
    # 重定向 URI: {callback_base_url}/api/oauth/callback/linkedin

  # --- 国内平台 ---
  bilibili:
    client_id: ""
    client_secret: ""
    # Bilibili 开放平台 → 应用管理
    # 重定向 URI: {callback_base_url}/api/oauth/callback/bilibili
  douyin:
    client_id: ""
    client_secret: ""
    # 抖音开放平台 → 应用管理（client_id 即 client_key）
    # 重定向 URI: {callback_base_url}/api/oauth/callback/douyin
  kwai:
    client_id: ""
    client_secret: ""
    # 快手开放平台 → 应用管理（client_id 即 app_id）
    # 重定向 URI: {callback_base_url}/api/oauth/callback/kwai
  xiaohongshu:
    client_id: ""
    client_secret: ""
    # 小红书开放平台 → 应用管理
    # 重定向 URI: {callback_base_url}/api/oauth/callback/xiaohongshu
  weixin_sph:
    # 微信视频号（Channels）
    app_id: ""
    app_secret: ""
    # 微信开放平台 → 管理中心 → 网站应用
    # 重定向 URI: {callback_base_url}/api/oauth/callback/weixin_sph
  weixin_gzh:
    # 微信公众号（Official Account）
    app_id: ""
    app_secret: ""
    # 微信公众平台 → 开发 → 基本配置
    # 重定向 URI: {callback_base_url}/api/oauth/callback/weixin_gzh
