# VideoFactory 配置模板
# 复制此文件为 settings.yaml 并填入实际配置

# LLM配置
llm:
  base_url: "https://api.groq.com/openai/v1"
  api_key: "YOUR_API_KEY_HERE"
  model: "llama-3.3-70b-versatile"

# 翻译配置
translation:
  provider: "volcengine_ark"
  strict_json: false
  local_llm:
    enabled: false
    base_url: "http://127.0.0.1:1234/v1"
    api_key: ""
    model: ""
    timeout: 120
  volcengine_ark:
    enabled: false
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: ""
    model: "doubao-seed-translation-250915"
    timeout: 60
  llm:
    timeout: 60

# ASR配置
asr:
  provider: auto
  allow_fallback: true
  allow_router_with_tts: true
  fallback_order:
    - youtube
    - volcengine
    - whisper
  youtube_skip_download: false
  youtube_preferred_langs:
    - en
    - en-US
    - en-GB
  youtube:
    enabled: true
  whisper:
    enabled: true
    base_url: "http://127.0.0.1:8866/v1"
    model: "whisper-1"
    timeout: 600
  volcengine:
    enabled: false
    app_id: "YOUR_APP_ID"
    token: "YOUR_TOKEN"
    http_url: ""
    ws_url: "wss://openspeech.bytedance.com/api/v3/sauc/bigmodel"
    timeout: 120

# TTS配置
tts:
  provider: "volcengine"
  fallback_order:
    - volcengine
  volcengine:
    enabled: true
    appid: "YOUR_APP_ID"
    access_token: "YOUR_TOKEN"
    resource_id: "seed-tts-1.0"
    cluster: "volcano_tts"
    api_url: "https://openspeech.bytedance.com/api/v3/tts/unidirectional"
    default_voice: "zh_female_shuangkuaisisi_moon_bigtts"
    encoding: "mp3"
    sample_rate: 24000
    timeout: 120

# FFmpeg配置
ffmpeg:
  path: ""
  ffprobe_path: ""

# 存储配置
storage:
  r2:
    bucket: "videoflow"
    rclone_remote: "r2"
  local:
    working_dir: "~/.video-factory/working"
    output_dir: "~/.video-factory/output"

# 发布配置
distribute:
  auto_publish: false
  social_auto_upload_path: ""
  account_dir: ""
